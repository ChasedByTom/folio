<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jerry Jose's portfolio is being updated." />
  <title>Jerry Jose — Updating</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --paper:      #faf8f4;   /* warm cream, matches the folio */
      --ink:        #1f1d1a;
      --ink-muted:  #5b574f;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      /* Full-viewport, centered both axes */
      min-height: 100vh;
      min-height: 100dvh;          /* accurate on mobile browsers */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-align: center;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 520px;
    }

    .wrap img {
      width: min(340px, 74vw);
      height: auto;
      display: block;
      border-radius: 14px;
    }

    .wrap p {
      margin: 30px 0 0;
      font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      font-size: clamp(1.05rem, 1rem + 1.2vw, 1.35rem);
      line-height: 1.5;
      color: var(--ink-muted);
      max-width: 32ch;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="j1.gif" alt="A looping packet of bytes — Jerry's animation" />
    <p>Jerry's portfolio is being updated. He has nothing but this packet of Bytes to offer you now.</p>
  </main>
</body>
</html>
